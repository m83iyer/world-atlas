<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Atlas — Interactive Country Explorer</title>

  <!-- Leaflet CSS (split into its own file later: styles/leaflet.css) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* ================================================================
       DESIGN TOKENS — change these to retheme the entire app
       ================================================================ */
    :root {
      --accent:         #2563eb;
      --accent-dark:    #1d4ed8;
      --accent-light:   #dbeafe;
      --bg-map:         #e8e2d5;
      --bg-panel:       #ffffff;
      --bg-header:      #12111a;
      --text-primary:   #1a1a2e;
      --text-secondary: #6b7280;
      --text-muted:     #9ca3af;
      --border-light:   #e5e0d8;
      --border-medium:  #d1cdc4;
      --shadow-panel:   -2px 0 24px rgba(0,0,0,0.10), -1px 0 0 #e5e0d8;
      --radius-card:    10px;
      --radius-tag:     20px;
      --panel-width:    340px;
      --header-height:  56px;
      --font:           system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ================================================================
       RESET
       ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-map);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ================================================================
       APP SHELL
       ================================================================ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ================================================================
       HEADER
       ================================================================ */
    #header {
      height: var(--header-height);
      background: var(--bg-header);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      text-decoration: none;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #f0f0f8;
    }

    .logo-sub {
      font-size: 11px;
      color: #55546a;
      font-weight: 400;
    }

    /* Header right side container */
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hint-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
      cursor: default;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ================================================================
       SEARCH — wrapper, input, dropdown
       ================================================================ */
    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      color: #55546a;
      display: flex;
      align-items: center;
      pointer-events: none;
      z-index: 1;
    }

    #search-input {
      width: 220px;
      height: 32px;
      padding: 0 12px 0 32px;
      background: #1c1b27;
      color: #f0f0f8;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 7px;
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    #search-input::placeholder {
      color: #55546a;
    }

    #search-input:focus {
      border-color: rgba(37,99,235,0.6);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.18);
    }

    #search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      width: 260px;
      background: #ffffff;
      border: 1px solid var(--border-light);
      border-radius: 9px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.08);
      max-height: 280px;
      overflow-y: auto;
      z-index: 2000;
      padding: 4px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border-medium) transparent;
      animation: dropdownIn 0.14s ease;
    }

    #search-dropdown::-webkit-scrollbar       { width: 4px; }
    #search-dropdown::-webkit-scrollbar-track { background: transparent; }
    #search-dropdown::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }

    @keyframes dropdownIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    #search-dropdown.open { display: block; }

    .search-result {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-primary);
      transition: background 0.1s ease;
      user-select: none;
    }

    .search-result:hover,
    .search-result.active {
      background: var(--accent-light);
    }

    .search-result-flag {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    .search-result-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-empty {
      padding: 12px 14px;
      font-size: 12.5px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ================================================================
       MAP WRAPPER
       ================================================================ */
    #map-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Leaflet container background matches our map color */
    .leaflet-container {
      background: var(--bg-map) !important;
      cursor: default;
    }

    .leaflet-grab    { cursor: grab;    }
    .leaflet-grabbing{ cursor: grabbing; }

    /* Feature 1: smooth pop/lift animation for country selection */
    .leaflet-interactive {
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  filter   0.18s ease;
    }

    /* Clean up zoom control */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.13) !important;
      border-radius: 8px !important;
      overflow: hidden;
    }

    .leaflet-control-zoom a {
      background: #ffffff !important;
      color: var(--text-primary) !important;
      border: none !important;
      font-size: 16px !important;
      width: 32px !important;
      height: 32px !important;
      line-height: 32px !important;
    }

    .leaflet-control-zoom a:hover {
      background: #f4f0eb !important;
    }

    .leaflet-control-zoom-in  { border-bottom: 1px solid #eee !important; }

    .leaflet-control-attribution {
      background: rgba(255,255,255,0.65) !important;
      font-size: 10px !important;
      backdrop-filter: blur(4px);
    }

    /* ================================================================
       LOADING OVERLAY
       ================================================================ */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg-map);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 800;
      transition: opacity 0.45s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid var(--border-medium);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    /* ================================================================
       INFO PANEL — fixed right side
       To split into panel component later: extract into panel.js + panel.css
       ================================================================ */
    #info-panel {
      position: fixed;
      top: var(--header-height);
      right: 0;
      width: var(--panel-width);
      height: calc(100vh - var(--header-height));
      background: var(--bg-panel);
      box-shadow: var(--shadow-panel);
      z-index: 900;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-medium) transparent;

      /* Hidden state — slides in from right */
      transform: translateX(100%);
      opacity: 0;
      transition:
        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        opacity   0.22s ease;
    }

    #info-panel::-webkit-scrollbar       { width: 4px; }
    #info-panel::-webkit-scrollbar-track { background: transparent; }
    #info-panel::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }

    /* Visible state */
    #info-panel.visible {
      transform: translateX(0);
      opacity: 1;
    }

    /* ================================================================
       PANEL — COUNTRY HEADER
       ================================================================ */
    .country-header {
      padding: 26px 24px 20px;
      border-bottom: 1px solid var(--border-light);
      background: linear-gradient(145deg, #fafaf8 0%, #f3efe8 100%);
    }

    .country-flag {
      font-size: 46px;
      line-height: 1;
      margin-bottom: 10px;
      display: block;
      /* Crisp emoji rendering */
      text-rendering: optimizeLegibility;
    }

    .country-name {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .continent-badge {
      display: inline-flex;
      align-items: center;
      background: var(--accent-light);
      color: var(--accent-dark);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: var(--radius-tag);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ================================================================
       PANEL — DATA SECTIONS
       ================================================================ */
    .data-section {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-light);
    }

    .data-section:last-of-type { border-bottom: none; }

    .section-label {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Two-column grid for key/value pairs */
    .kv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 12px;
    }

    .kv-item { display: flex; flex-direction: column; gap: 3px; }
    .kv-item.full { grid-column: 1 / -1; }

    .kv-key {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .kv-val {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }

    /* ================================================================
       PANEL — TAGS (cities, languages)
       ================================================================ */
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }

    .tag {
      display: inline-flex;
      align-items: center;
      background: #f4f0eb;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: var(--radius-tag);
      border: 1px solid var(--border-light);
    }

    /* ================================================================
       PANEL — CURRENCY BLOCK
       ================================================================ */
    .currency-block {
      background: #f8f6f2;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      padding: 13px 14px;
    }

    .currency-top {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .currency-code {
      font-size: 19px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .currency-name {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .currency-rate {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      letter-spacing: 0.01em;
    }

    /* ================================================================
       PANEL — PIN HINT BAR
       ================================================================ */
    .pin-hint {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 11px 24px;
      font-size: 11px;
      color: var(--text-muted);
      background: #fafaf8;
      border-top: 1px solid var(--border-light);
    }

    .pin-hint.is-locked {
      color: var(--accent-dark);
      background: var(--accent-light);
    }

    /* ================================================================
       PANEL CONTENT FADE TRANSITION (Feature 2)
       ================================================================ */
    #panel-content { transition: opacity 0.15s ease; }

    /* ================================================================
       PANEL LOADING SKELETON (Feature 3)
       ================================================================ */
    .skeleton {
      background: linear-gradient(90deg, #f0ede8 25%, #e8e4de 50%, #f0ede8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ================================================================
       FLOATING COUNTRY TOOLTIP (Feature 4)
       ================================================================ */
    .country-tooltip {
      background: rgba(18,17,26,0.85);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      letter-spacing: 0.02em;
    }

    .country-tooltip::before { display: none; }
    .leaflet-tooltip.country-tooltip { background: rgba(18,17,26,0.85); border: none; }
    .leaflet-tooltip.country-tooltip::before { display: none; }

    /* ================================================================
       PANEL — NO DATA STATE
       ================================================================ */
    .no-data-body {
      padding: 28px 24px;
      text-align: center;
    }

    .no-data-icon  { font-size: 38px; opacity: 0.35; margin-bottom: 10px; }
    .no-data-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .no-data-text  { font-size: 12.5px; color: var(--text-secondary); line-height: 1.65; }
    .no-data-text code {
      background: #f0ede8;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }

    /* ================================================================
       DARK MODE TOGGLE BUTTON (Feature 7)
       ================================================================ */
    #theme-toggle {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: #9ca3af;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    #theme-toggle:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

    /* Dark mode CSS variables and overrides */
    [data-theme="dark"] {
      --bg-map:         #1a1f2e;
      --bg-panel:       #12111a;
      --bg-header:      #0a090f;
      --text-primary:   #e8e8f0;
      --text-secondary: #9ca3af;
      --text-muted:     #6b7280;
      --border-light:   #2a2838;
      --border-medium:  #3a3848;
      --shadow-panel:   -2px 0 24px rgba(0,0,0,0.4), -1px 0 0 #2a2838;
    }
    [data-theme="dark"] .leaflet-container { background: #1a1f2e !important; }
    [data-theme="dark"] .country-header { background: linear-gradient(145deg, #1e1d2a 0%, #1a1928 100%); }
    [data-theme="dark"] .tag { background: #2a2838; border-color: #3a3848; color: #9ca3af; }
    [data-theme="dark"] .currency-block { background: #1e1d2a; border-color: #2a2838; }
    [data-theme="dark"] .kv-val { color: #e8e8f0; }
    [data-theme="dark"] .pin-hint { background: #1a1928; border-color: #2a2838; }
    [data-theme="dark"] .leaflet-control-zoom a { background: #1e1d2a !important; color: #e8e8f0 !important; }
    [data-theme="dark"] .leaflet-control-zoom a:hover { background: #2a2838 !important; }
    [data-theme="dark"] #search-input { background: #0e0d18; border-color: rgba(255,255,255,0.08); }
    [data-theme="dark"] #search-dropdown { background: #1e1d2a; border: 1px solid #2a2838; }
    [data-theme="dark"] .search-result:hover,
    [data-theme="dark"] .search-result.active { background: #2a2838; }
    [data-theme="dark"] .search-result-name { color: #e8e8f0; }

    /* ================================================================
       MOBILE DRAG HANDLE (Feature 8)
       ================================================================ */
    #panel-drag-handle {
      display: none;
      padding: 10px 0 4px;
      cursor: grab;
      touch-action: none;
      background: var(--bg-panel);
      border-radius: 12px 12px 0 0;
    }
    .drag-bar {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-medium);
      margin: 0 auto;
    }

    /* ================================================================
       COUNTRY COMPARISON MODE (Feature 9)
       ================================================================ */
    #info-panel.comparison-mode { width: min(640px, 100vw); }

    .compare-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .compare-exit {
      background: none;
      border: 1px solid var(--border-medium);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .compare-exit:hover { border-color: var(--accent); color: var(--accent); }
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .compare-col {
      padding: 16px 20px;
      border-right: 1px solid var(--border-light);
    }
    .compare-col:last-child { border-right: none; }
    .compare-col-flag { font-size: 32px; margin-bottom: 6px; }
    .compare-col-name { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .compare-col-name.primary { color: var(--accent); }
    .compare-col-name.secondary { color: #7c3aed; }
    .compare-row { margin-bottom: 10px; }
    .compare-row .kv-key { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 2px; }
    .compare-row .kv-val { font-size: 13px; font-weight: 500; color: var(--text-primary); }

    /* ================================================================
       CURRENCY UPDATE NOTE (Feature 10)
       ================================================================ */
    .currency-update-note {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.02em;
    }

    /* ================================================================
       RESPONSIVE — mobile: panel slides up from bottom
       ================================================================ */
    @media (max-width: 768px) {
      :root { --panel-width: 100vw; }

      #info-panel {
        top: auto;
        bottom: 0;
        height: 55vh;
        width: 100%;
        transform: translateY(110%);
        box-shadow: 0 -4px 30px rgba(0,0,0,0.14);
      }

      #info-panel.visible { transform: translateY(0); }

      #panel-drag-handle { display: block; }

      #info-panel {
        transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease, height 0.2s ease;
        border-radius: 16px 16px 0 0;
      }

      .header-right { display: none; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header id="header">
    <div class="logo">
      <div class="logo-icon">🌍</div>
      <span class="logo-text">World Atlas</span>
      <span class="logo-sub">&nbsp;Interactive Explorer</span>
    </div>
    <div class="header-right">
      <button id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
      <div class="hint-dot" title="Hover or tap a country to explore"></div>
      <div class="search-wrapper">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
          </svg>
        </span>
        <input id="search-input" type="text" placeholder="Search countries…" autocomplete="off" spellcheck="false" />
        <div id="search-dropdown" role="listbox" aria-label="Country suggestions"></div>
      </div>
    </div>
  </header>

  <!-- ============================================================
       MAP
       ============================================================ -->
  <div id="map-wrapper">
    <div id="map"></div>

    <div id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading world map&hellip;</div>
    </div>
  </div>

</div><!-- /#app -->

<!-- ============================================================
     INFO PANEL  (lives outside #app so it overlays the map correctly)
     ============================================================ -->
<div id="info-panel" role="complementary" aria-label="Country information">
  <div id="panel-drag-handle" aria-hidden="true"><div class="drag-bar"></div></div>
  <div id="panel-content"></div>
</div>

<!-- Leaflet JS (split out later: <script src="lib/leaflet.js"></script>) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
'use strict';

/* ================================================================
   COUNTRY DATA
   — 20 prototype entries keyed by ISO Alpha-2 code
   — To expand: add more objects here with the same shape.
     Zero other code changes needed.
   — To externalise: move this object to countries.json and
     fetch() it alongside the GeoJSON below.
   ================================================================ */
const COUNTRY_DATA = {

  /* ── NORTH AMERICA ─────────────────────────────────────── */
  "US": {
    name: "United States",
    continent: "North America",
    capital: "Washington, D.C.",
    top_cities: ["New York", "Los Angeles", "Chicago"],
    population: "335 million",
    languages: ["English", "Spanish", "French"],
    currency_name: "US Dollar",
    currency_code: "USD",
    currency_value_note: "Global reserve currency",
    flag_emoji: "🇺🇸"
  },
  "CA": {
    name: "Canada",
    continent: "North America",
    capital: "Ottawa",
    top_cities: ["Toronto", "Vancouver", "Montréal"],
    population: "40 million",
    languages: ["English", "French", "Punjabi"],
    currency_name: "Canadian Dollar",

   — lockedCode: ISO_A2 of the click-pinned country (persists after mouse-out)
   — geoJsonLayer: the Leaflet GeoJSON layer once loaded
   — layersByCode: { "US": leafletLayer, ... } for O(1) style updates
   ================================================================ */
let hoverCode    = null;
let lockedCode   = null;
let compareCode  = null;
let geoJsonLayer = null;
const layersByCode = {};

/** Returns the ISO code that should drive the UI right now. */
function getEffectiveCode() {
  return lockedCode !== null ? lockedCode : hoverCode;
}

/* ================================================================
   INITIALISE LEAFLET MAP
   ================================================================ */
const map = L.map('map', {
  center:          [20, 0],
  zoom:            2,
  minZoom:         1.5,
  maxZoom:         10,
  worldCopyJump:   true,
  zoomControl:     true,
  attributionControl: true
});

// Move zoom control to bottom-left so it doesn't clash with the info panel
map.zoomControl.setPosition('bottomleft');

// Initialise theme toggle before GeoJSON fetch (Feature 7)
initTheme();

// Clicking empty ocean/space clears the pin and flies back to world view
map.on('click', function () {
  lockedCode  = null;
  compareCode = null;
  hoverCode   = null;
  updateStyles();
  updatePanel();
  map.flyTo([20, 0], 2, { duration: 0.9, easeLinearity: 0.35 });
});

/* ================================================================
   LOAD WORLD GEOJSON
   Source: Natural Earth via the "geo-countries" dataset on GitHub.
   Each Feature has:  properties['ISO3166-1-Alpha-2']  ("US", "DE", "-99" for unknowns)
                      properties.name                  ("United States", "Germany" …)

   To use a local file later, replace the URL with './world.geojson'
   ================================================================ */
const GEOJSON_URL =
  'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson';

fetch(GEOJSON_URL)
  .then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function (geojson) {

    // Create the GeoJSON layer with initial default styles
    geoJsonLayer = L.geoJSON(geojson, {
      style:          function () { return Object.assign({}, STYLES.default); },
      onEachFeature:  bindFeatureEvents
    }).addTo(map);

    // Build the layersByCode lookup after adding to map
    // NOTE: this GeoJSON uses 'ISO3166-1-Alpha-2' and 'name' (not 'ISO_A2'/'ADMIN')
    geoJsonLayer.eachLayer(function (layer) {
      var props = layer.feature.properties;
      var iso   = props['ISO3166-1-Alpha-2'];
      if (iso && iso !== '-99') {
        layersByCode[iso] = layer;
      } else {
        var key = '_n_' + normaliseName(props.name || '');
        layersByCode[key] = layer;
      }
    });

    // Fit to world bounds
    map.fitBounds([[-60, -180], [82, 180]]);
    hideLoading();
    initSearch();
    initDragHandle();
  })
  .catch(function (err) {
    console.error('GeoJSON load failed:', err);
    document.querySelector('.loading-text').textContent =
      'Failed to load map data. Check your internet connection.';
  });

/* ================================================================
   BIND MOUSE / TOUCH EVENTS TO EACH COUNTRY POLYGON
   ================================================================ */
function bindFeatureEvents(feature, layer) {
  layer.on({
    mouseover: onHoverEnter,
    mouseout:  onHoverLeave,
    click:     onCountryClick
  });

  // Feature 4: Floating country name tooltip
  var tooltipName = feature.properties.name || feature.properties['ISO3166-1-Alpha-2'] || '';
  layer.bindTooltip(tooltipName, {
    sticky: false,
    permanent: false,
    className: 'country-tooltip',
    direction: 'center',
    offset: [0, 0]
  });
}

function onHoverEnter(e) {
  var code = resolveCode(e.target.feature);
  if (code === hoverCode) return;   // already hovering this country
  hoverCode = code;
  updateStyles();
  updatePanel();
}

function onHoverLeave() {
  hoverCode = null;
  updateStyles();
  // Only close the panel if nothing is pinned
  if (lockedCode === null) {
    updatePanel();
  }
}

function onCountryClick(e) {
  // Stop the map's own click handler from firing (which would clear the lock)
  L.DomEvent.stopPropagation(e);

  var code = resolveCode(e.target.feature);

  // Feature 9: Shift+click for comparison mode
  if (e.originalEvent && e.originalEvent.shiftKey && lockedCode && code !== lockedCode) {
    compareCode = (compareCode === code) ? null : code;
    updateStyles();
    updatePanel();
    return;
  }

  // Normal click behaviour — pin/unpin panel, no zoom
  compareCode = null;
  if (lockedCode === code) {
    // Clicking the same pinned country unlocks it
    lockedCode = null;
  } else {
    lockedCode = code;
  }

  updateStyles();
  updatePanel();
}

/* ================================================================
   RESOLVE ISO CODE FROM A GEOJSON FEATURE
   — returns ISO_A2 when available, otherwise a normalised name key
   ================================================================ */
function resolveCode(feature) {
  var iso = feature.properties['ISO3166-1-Alpha-2'];
  if (iso && iso !== '-99') return iso;
  return '_n_' + normaliseName(feature.properties.name || '');
}

/* ================================================================
   NORMALISE A COUNTRY NAME TO A STABLE LOWERCASE KEY
   Used to match GeoJSON ADMIN names against COUNTRY_DATA entries
   when ISO codes are unavailable or mismatched.
   ================================================================ */
function normaliseName(name) {
  return name.toLowerCase().replace(/[^a-z]/g, '');
}

/* ================================================================
   UPDATE ALL LAYER STYLES
   Iterates every polygon and applies the correct style preset.
   Called on every hover/click change.
   ================================================================ */
function updateStyles() {
  if (!geoJsonLayer) return;

  var effective = getEffectiveCode();

  geoJsonLayer.eachLayer(function (layer) {
    var code = resolveCode(layer.feature);
    var el   = layer.getElement ? layer.getElement() : null;

    if (!effective) {
      // Nothing active — reset everything to default with continent tinting (Feature 6)
      var countryData = COUNTRY_DATA[code];
      var continent   = countryData ? countryData.continent : null;
      var continentFill = continent ? (CONTINENT_COLORS[continent] || STYLES.default.fillColor) : STYLES.default.fillColor;
      layer.setStyle(Object.assign({}, STYLES.default, { fillColor: continentFill }));
      // Feature 1: remove pop effect when nothing active
      if (el) { el.style.filter = ''; el.style.transform = ''; el.style.transformOrigin = ''; }

    } else if (code === effective) {
      // This is the active country
      layer.setStyle(STYLES.active);
      // Bring to front so its thick border renders on top
      if (layer.bringToFront) layer.bringToFront();
      // Feature 1: pop/lift effect — scale up from the country's geographic centre
      if (el) {
        var center = layer.getBounds().getCenter();
        var pt     = map.latLngToContainerPoint(center);
        el.style.transformOrigin = pt.x + 'px ' + pt.y + 'px';
        el.style.transform       = 'scale(1.08)';
        el.style.filter          = 'drop-shadow(0 6px 16px rgba(37,99,235,0.55))';
      }

    } else if (code === compareCode) {
      // Feature 9: comparison country gets secondary accent colour + pop
      layer.setStyle({ fillColor: '#7c3aed', fillOpacity: 0.88, color: '#6d28d9', weight: 2.5, smoothFactor: 1 });
      if (layer.bringToFront) layer.bringToFront();
      if (el) {
        var center2 = layer.getBounds().getCenter();
        var pt2     = map.latLngToContainerPoint(center2);
        el.style.transformOrigin = pt2.x + 'px ' + pt2.y + 'px';
        el.style.transform       = 'scale(1.06)';
        el.style.filter          = 'drop-shadow(0 6px 16px rgba(124,58,237,0.55))';
      }

    } else {
      // Everything else gets muted — reset any pop
      layer.setStyle(STYLES.muted);
      if (el) { el.style.filter = ''; el.style.transform = ''; el.style.transformOrigin = ''; }
    }
  });
}

/* ================================================================
   UPDATE INFO PANEL
   Finds the country data, renders the card, and shows the panel.
   ================================================================ */
function updatePanel() {
  var panel   = document.getElementById('info-panel');
  var content = document.getElementById('panel-content');
  var effective = getEffectiveCode();

  if (!effective) {
    panel.classList.remove('visible');
    panel.classList.remove('comparison-mode');
    return;
  }

  // Feature 9: Comparison mode — show two country cards side by side
  if (lockedCode && compareCode) {
    var dataA = lookupData(lockedCode);
    var dataB = lookupData(compareCode);
    var nameA = dataA ? dataA.name : nameFromCode(lockedCode);
    var nameB = dataB ? dataB.name : nameFromCode(compareCode);
    // Feature 2: fade transition
    content.style.opacity = '0';
    content.innerHTML = renderComparison(dataA, nameA, dataB, nameB);
    panel.classList.add('visible');
    panel.classList.add('comparison-mode');
    requestAnimationFrame(function () { content.style.opacity = '1'; });
    return;
  }

  panel.classList.remove('comparison-mode');

  // Feature 2: start fade out
  content.style.opacity = '0';

  // Feature 3: show skeleton briefly before real content
  content.innerHTML = renderSkeleton();
  panel.classList.add('visible');

  setTimeout(function () {
    // Look up facts in COUNTRY_DATA
    var data = lookupData(effective);
    // Get a human-readable name even if we have no facts
    var displayName = data ? data.name : nameFromCode(effective);

    content.innerHTML = renderCard(data, displayName);
    // Feature 2: fade in
    requestAnimationFrame(function () { content.style.opacity = '1'; });
  }, 80);
}

/* ================================================================
   LOOK UP COUNTRY FACTS
   — First tries direct ISO_A2 key
   — Falls back to matching by normalised name (for _n_ keys)
   ================================================================ */
function lookupData(code) {
  // Direct ISO match
  if (COUNTRY_DATA[code]) return COUNTRY_DATA[code];

  // Name-based match for countries without a valid ISO_A2
  if (code.startsWith('_n_')) {
    var target = code.slice(3);
    for (var iso in COUNTRY_DATA) {
      if (normaliseName(COUNTRY_DATA[iso].name) === target) {
        return COUNTRY_DATA[iso];
      }
    }
  }

  return null;
}

/* ================================================================
   RESOLVE A READABLE NAME FROM AN EFFECTIVE CODE
   Used when we have no COUNTRY_DATA entry for the code.
   ================================================================ */
function nameFromCode(code) {
  if (!geoJsonLayer) return code;

  if (code.startsWith('_n_')) {
    // Re-derive from GeoJSON ADMIN field
    var target = code.slice(3);
    var found  = code; // fallback to key
    geoJsonLayer.eachLayer(function (layer) {
      var admin = layer.feature.properties.name || '';
      if (normaliseName(admin) === target) found = admin;
    });
    return found;
  }

  return code; // ISO code itself if all else fails
}

/* ================================================================
   RENDER FLASHCARD HTML
   — data:        COUNTRY_DATA entry (or null if not available)
   — displayName: human-readable country name
   ================================================================ */
function renderCard(data, displayName) {
  var locked = lockedCode !== null;

  // ── No data state ────────────────────────────────────────────
  if (!data) {
    return (
      '<div class="country-header">' +
        '<span class="country-flag">🌐</span>' +
        '<div class="country-name">' + esc(displayName) + '</div>' +
      '</div>' +
      '<div class="no-data-body">' +
        '<div class="no-data-icon">📋</div>' +
        '<div class="no-data-title">No detailed data yet</div>' +
        '<div class="no-data-text">' +
          'Add an entry to the <code>COUNTRY_DATA</code> object at the top of the script ' +
          'This territory or region is not in the dataset. ' +
          'To add it, append an entry to <code>COUNTRY_DATA</code> in the script.' +
        '</div>' +
      '</div>' +
      pinHint(locked)
    );
  }

  // ── Full card ─────────────────────────────────────────────────
  var cities = data.top_cities.map(function (c) {
    return '<span class="tag">' + esc(c) + '</span>';
  }).join('');

  var langs = data.languages.map(function (l) {
    return '<span class="tag">' + esc(l) + '</span>';
  }).join('');

  return (
    // Country header
    '<div class="country-header">' +
      '<span class="country-flag">' + data.flag_emoji + '</span>' +
      '<div class="country-name">'  + esc(data.name)  + '</div>' +
      '<span class="continent-badge">' + esc(data.continent) + '</span>' +
    '</div>' +

    // Overview: capital + population
    '<div class="data-section">' +
      '<div class="section-label">Overview</div>' +
      '<div class="kv-grid">' +
        '<div class="kv-item">' +
          '<div class="kv-key">Capital</div>' +
          '<div class="kv-val">' + esc(data.capital) + '</div>' +
        '</div>' +
        '<div class="kv-item">' +
          '<div class="kv-key">Population</div>' +
          '<div class="kv-val">' + esc(data.population) + '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // Major cities
    '<div class="data-section">' +
      '<div class="section-label">Major Cities</div>' +
      '<div class="tag-list">' + cities + '</div>' +
    '</div>' +

    // Languages
    '<div class="data-section">' +
      '<div class="section-label">Languages</div>' +
      '<div class="tag-list">' + langs + '</div>' +
    '</div>' +

    // Currency (Feature 10: upgraded with update note)
    '<div class="data-section">' +
      '<div class="section-label">Currency</div>' +
      '<div class="currency-block">' +
        '<div class="currency-top">' +
          '<span class="currency-code">' + esc(data.currency_code) + '</span>' +
          '<span class="currency-name">' + esc(data.currency_name) + '</span>' +
        '</div>' +
        '<div class="currency-rate">' + esc(data.currency_value_note) + '</div>' +
        '<div class="currency-update-note">Exchange rate — static reference</div>' +
      '</div>' +
    '</div>' +

    pinHint(locked)
  );
}

/* ================================================================
   RENDER PIN HINT BAR
   ================================================================ */
function pinHint(isLocked) {
  if (isLocked) {
    return (
      '<div class="pin-hint is-locked">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0">' +
          '<path d="M16 1a2 2 0 0 1 2 2v2.586L7.293 16.293A1 1 0 0 0 7 17v3a1 1 0 0 0 1 ' +
          '1h3a1 1 0 0 0 .707-.293L22 10.414V13a2 2 0 0 1-4 0v-.586l-1.707 1.707A1 1 0 ' +
          '0 1 15.586 15H13v-2.586a1 1 0 0 1 .293-.707L16 9.586V7h-2.586a1 1 0 0 ' +
          '1-.707-.293L11.414 5H11V3a2 2 0 0 1 2-2h3z"/>' +
        '</svg>' +
        'Pinned — Shift+click another country to compare' +
      '</div>'
    );
  }
  return (
    '<div class="pin-hint">' +
      '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
           'stroke-width="2" style="flex-shrink:0">' +
        '<circle cx="12" cy="12" r="3"/>' +
        '<path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42' +
              'M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>' +
      '</svg>' +
      'Click to pin this card open' +
    '</div>'
  );
}

/* ================================================================
   HIDE LOADING OVERLAY (called after GeoJSON loads)
   ================================================================ */
function hideLoading() {
  var overlay = document.getElementById('loading-overlay');
  overlay.classList.add('hidden');
  setTimeout(function () {
    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
  }, 500);
}

/* ================================================================
   UTILITY: HTML ESCAPE
   Prevents XSS when injecting data into innerHTML.
   ================================================================ */
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ================================================================
   COUNTRY SEARCH — initSearch / filterCountries / renderDropdown /
                    selectCountry / hideDropdown
   ================================================================ */

function initSearch() {
  var input    = document.getElementById('search-input');
  var dropdown = document.getElementById('search-dropdown');
  if (!input || !dropdown) return;

  var activeIndex = -1;

  input.addEventListener('input', function () {
    activeIndex = -1;
    filterCountries(input.value.trim());
  });

  input.addEventListener('keydown', function (e) {
    var items = dropdown.querySelectorAll('.search-result');
    if (!items.length) return;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, items.length - 1);
      updateActive(items, activeIndex);

    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      updateActive(items, activeIndex);

    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIndex >= 0 && items[activeIndex]) {
        items[activeIndex].click();
      }

    } else if (e.key === 'Escape') {
      hideDropdown();
      input.blur();
    }
  });

  document.addEventListener('click', function (e) {
    if (!e.target.closest('.search-wrapper')) {
      hideDropdown();
    }
  });

  function updateActive(items, idx) {
    items.forEach(function (item, i) {
      item.classList.toggle('active', i === idx);
    });
  }
}

function filterCountries(query) {
  if (query.length < 1) {
    hideDropdown();
    return;
  }

  var lower  = query.toLowerCase();
  var codes  = Object.keys(COUNTRY_DATA);
  var results = [];

  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    var data = COUNTRY_DATA[code];
    var name = (data.name || '').toLowerCase();
    // Also match by ISO code itself
    if (name.indexOf(lower) !== -1 || code.toLowerCase().indexOf(lower) !== -1) {
      results.push(code);
    }
    if (results.length >= 8) break;
  }

  renderDropdown(results);
}

function renderDropdown(results) {
  var dropdown = document.getElementById('search-dropdown');
  if (!dropdown) return;

  // Clear previous results
  while (dropdown.firstChild) dropdown.removeChild(dropdown.firstChild);

  if (results.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'search-empty';
    empty.textContent = 'No countries found';
    dropdown.appendChild(empty);
  } else {
    results.forEach(function (code) {
      var data = COUNTRY_DATA[code];
      var item = document.createElement('div');
      item.className = 'search-result';
      item.setAttribute('role', 'option');
      item.setAttribute('data-code', code);

      var flag = document.createElement('span');
      flag.className = 'search-result-flag';
      flag.textContent = data.flag_emoji || '';

      var name = document.createElement('span');
      name.className = 'search-result-name';
      name.textContent = data.name || code;

      item.appendChild(flag);
      item.appendChild(name);
      item.addEventListener('click', function () { selectCountry(code); });
      dropdown.appendChild(item);
    });
  }

  dropdown.classList.add('open');
}

function selectCountry(code) {
  lockedCode = code;
  hoverCode  = null;
  updateStyles();
  updatePanel();

  if (layersByCode[code]) {
    // Feature 5: smooth fly-to animation from search
    map.flyToBounds(layersByCode[code].getBounds(), { padding: [80, 80], duration: 0.8, easeLinearity: 0.35 });
  }

  var input = document.getElementById('search-input');
  if (input) input.value = '';
  hideDropdown();
}

function hideDropdown() {
  var dropdown = document.getElementById('search-dropdown');
  if (!dropdown) return;
  while (dropdown.firstChild) dropdown.removeChild(dropdown.firstChild);
  dropdown.classList.remove('open');
}

/* ================================================================
   RENDER SKELETON (Feature 3)
   Shown briefly before real content while the panel fades in.
   ================================================================ */
function renderSkeleton() {
  return (
    '<div class="country-header">' +
      '<div class="skeleton" style="width:48px;height:48px;border-radius:8px;margin-bottom:10px;"></div>' +
      '<div class="skeleton" style="width:70%;height:20px;margin-bottom:8px;"></div>' +
      '<div class="skeleton" style="width:40%;height:14px;"></div>' +
    '</div>' +
    '<div class="data-section">' +
      '<div class="skeleton" style="width:50px;height:10px;margin-bottom:10px;"></div>' +
      '<div class="kv-grid">' +
        '<div class="kv-item"><div class="skeleton" style="height:30px;"></div></div>' +
        '<div class="kv-item"><div class="skeleton" style="height:30px;"></div></div>' +
      '</div>' +
    '</div>' +
    '<div class="data-section">' +
      '<div class="skeleton" style="width:60px;height:10px;margin-bottom:10px;"></div>' +
      '<div style="display:flex;gap:6px;">' +
        '<div class="skeleton" style="width:70px;height:26px;border-radius:20px;"></div>' +
        '<div class="skeleton" style="width:80px;height:26px;border-radius:20px;"></div>' +
        '<div class="skeleton" style="width:60px;height:26px;border-radius:20px;"></div>' +
      '</div>' +
    '</div>'
  );
}

/* ================================================================
   RENDER COMPARISON LAYOUT (Feature 9)
   Shows two country cards side by side.
   ================================================================ */
function renderComparison(dataA, nameA, dataB, nameB) {
  function colHTML(data, name, colorClass) {
    var flag     = data ? data.flag_emoji       : '🌐';
    var capital  = data ? esc(data.capital)     : '—';
    var pop      = data ? esc(data.population)  : '—';
    var currency = data ? (esc(data.currency_code) + ' — ' + esc(data.currency_name)) : '—';
    return (
      '<div class="compare-col">' +
        '<div class="compare-col-flag">' + flag + '</div>' +
        '<div class="compare-col-name ' + colorClass + '">' + esc(name) + '</div>' +
        '<div class="compare-row"><div class="kv-key">Capital</div><div class="kv-val">' + capital + '</div></div>' +
        '<div class="compare-row"><div class="kv-key">Population</div><div class="kv-val">' + pop + '</div></div>' +
        '<div class="compare-row"><div class="kv-key">Currency</div><div class="kv-val">' + currency + '</div></div>' +
      '</div>'
    );
  }

  return (
    '<div class="compare-header">' +
      '<span>🔵 ' + esc(nameA) + ' &nbsp;vs&nbsp; 🟣 ' + esc(nameB) + '</span>' +
      '<button class="compare-exit" onclick="exitComparison()">&#x2715; Exit comparison</button>' +
    '</div>' +
    '<div class="compare-grid">' +
      colHTML(dataA, nameA, 'primary') +
      colHTML(dataB, nameB, 'secondary') +
    '</div>'
  );
}

function exitComparison() {
  compareCode = null;
  updateStyles();
  updatePanel();
}

/* ================================================================
   THEME TOGGLE (Feature 7)
   ================================================================ */
function initTheme() {
  var btn   = document.getElementById('theme-toggle');
  if (!btn) return;
  var saved = localStorage.getItem('atlas-theme') || 'light';
  if (saved === 'dark') {
    document.documentElement.dataset.theme = 'dark';
    btn.textContent = '☀️';
  }
  btn.addEventListener('click', function () {
    var isDark = document.documentElement.dataset.theme === 'dark';
    document.documentElement.dataset.theme = isDark ? 'light' : 'dark';
    btn.textContent = isDark ? '🌙' : '☀️';
    localStorage.setItem('atlas-theme', isDark ? 'light' : 'dark');
    if (geoJsonLayer) { updateStyles(); }
  });
}

/* ================================================================
   DRAG HANDLE FOR MOBILE BOTTOM SHEET (Feature 8)
   ================================================================ */
function initDragHandle() {
  if (window.innerWidth > 768) return;
  var handle = document.getElementById('panel-drag-handle');
  var panel  = document.getElementById('info-panel');
  if (!handle) return;
  var startY = 0, startH = 0, dragging = false;
  var SNAP_HEIGHTS = [0.3, 0.55, 0.82];

  handle.addEventListener('touchstart', function (e) {
    startY   = e.touches[0].clientY;
    startH   = panel.offsetHeight;
    dragging = true;
    panel.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    if (!dragging) return;
    var dy   = startY - e.touches[0].clientY;
    var newH = Math.max(80, Math.min(window.innerHeight * 0.9, startH + dy));
    panel.style.height = newH + 'px';
  }, { passive: true });

  document.addEventListener('touchend', function () {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = '';
    var h    = panel.offsetHeight;
    var frac = h / window.innerHeight;
    var nearest = SNAP_HEIGHTS.reduce(function (a, b) {
      return Math.abs(b - frac) < Math.abs(a - frac) ? b : a;
    });
    panel.style.height = (nearest * window.innerHeight) + 'px';
  });
}
